<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AD Login Test</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; }
    body { min-height: 100vh; background: linear-gradient(135deg, #1890ff, #096dd9); display: flex; align-items: center; justify-content: center; padding: 24px; }
    .card { background: #fff; border-radius: 16px; box-shadow: 0 8px 32px rgba(0,0,0,0.2); padding: 40px 36px; width: 380px; }
    .icon { text-align: center; font-size: 48px; margin-bottom: 8px; }
    h2 { text-align: center; color: #1f2937; margin-bottom: 4px; font-size: 22px; }
    .sub { text-align: center; color: #6b7280; font-size: 13px; margin-bottom: 28px; }
    label { display: block; font-size: 14px; color: #374151; font-weight: 500; margin-bottom: 6px; }
    input { width: 100%; padding: 10px 14px; font-size: 15px; border: 1px solid #d1d5db; border-radius: 8px; outline: none; margin-bottom: 16px; }
    input:focus { border-color: #1890ff; box-shadow: 0 0 0 2px rgba(24,144,255,0.2); }
    button { width: 100%; padding: 13px; font-size: 16px; font-weight: 600; color: #fff; background: #1890ff; border: none; border-radius: 8px; cursor: pointer; margin-top: 8px; }
    button:hover { background: #096dd9; }
    button:disabled { background: #93c5fd; cursor: not-allowed; }
    .result { margin-top: 20px; padding: 16px; border-radius: 8px; text-align: center; font-size: 22px; font-weight: 700; display: none; }
    .result.success { background: #f6ffed; color: #52c41a; border: 1px solid #b7eb8f; }
    .result.error   { background: #fff2f0; color: #ff4d4f; border: 1px solid #ffccc7; }
  </style>
</head>
<body>
  <div class="card">
    <div class="icon">🔐</div>
    <h2>AD Login Test</h2>
    <p class="sub">QATARNAV — ldap://172.25.24.210</p>

    <label>Username</label>
    <input type="text" id="username" placeholder="e.g. yabushaib" autocomplete="username" />

    <label>Password</label>
    <input type="password" id="password" placeholder="Windows password" autocomplete="current-password" />

    <button id="btn" onclick="testLogin()">Test Login</button>

    <div class="result" id="result"></div>
  </div>

  <script>
    async function testLogin() {
      const username = document.getElementById('username').value.trim();
      const password = document.getElementById('password').value;
      const btn = document.getElementById('btn');
      const result = document.getElementById('result');

      if (!username || !password) return;

      btn.disabled = true;
      btn.textContent = 'Testing...';
      result.style.display = 'none';

      try {
        const res = await fetch('http://localhost:5000/api/ad-test', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ server: 'ldap://172.25.24.210', domain: 'QATARNAV', username, password }),
        });
        const data = await res.json();
        result.className = 'result ' + (data.success ? 'success' : 'error');
        if (data.success) {
          result.textContent = '✅ Correct — ' + data.format;
        } else {
          const errors = Object.entries(data.results || {}).map(([k,v]) => `${k}: ${v.error}`).join('\n');
          result.style.fontSize = '13px';
          result.style.textAlign = 'left';
          result.style.whiteSpace = 'pre';
          result.textContent = '❌ Wrong\n\n' + errors;
        }
      } catch (e) {
        result.className = 'result error';
        result.textContent = '❌ Connection error';
      } finally {
        result.style.display = 'block';
        btn.disabled = false;
        btn.textContent = 'Test Login';
      }
    }

    document.addEventListener('keydown', e => { if (e.key === 'Enter') testLogin(); });
  </script>
</body>
</html>
